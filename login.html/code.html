<body class="bg-background text-on-surface font-body-md flex flex-col min-h-screen">
<!-- TopNavBar Component -->
<header class="bg-surface-container-lowest dark:bg-inverse-surface w-full top-0 sticky border-b border-outline-variant dark:border-outline z-50">
<nav class="flex justify-between items-center max-w-container-max mx-auto px-margin-desktop h-16">
<div class="flex items-center gap-8">
<a class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed" href="/">Ravi Store</a>
<div class="hidden md:flex gap-6 items-center">
<a class="font-label-md text-label-md text-on-surface-variant dark:text-surface-variant hover:text-secondary dark:hover:text-secondary-fixed transition-colors" href="#">Shop</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-surface-variant hover:text-secondary dark:hover:text-secondary-fixed transition-colors" href="#">Categories</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-surface-variant hover:text-secondary dark:hover:text-secondary-fixed transition-colors" href="#">Deals</a>
<a class="font-label-md text-label-md text-on-surface-variant dark:text-surface-variant hover:text-secondary dark:hover:text-secondary-fixed transition-colors" href="#">Orders</a>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-primary dark:text-primary-fixed hover:bg-surface-container-high rounded-full transition-all">
<span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
</button>
<button class="p-2 text-primary dark:text-primary-fixed hover:bg-surface-container-high rounded-full transition-all border-2 border-primary">
<span class="material-symbols-outlined" data-icon="person">person</span>
</button>
</div>
</nav>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center py-12 px-margin-mobile">
<div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl auth-card-shadow border border-outline-variant p-8 md:p-10">
<!-- Brand Identity -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Welcome Back</h1>
<p class="text-on-surface-variant font-body-md">Login to your Ravi Store account</p>
</div>
<!-- Auth Form -->
<form class="space-y-6" id="loginForm">
<!-- Email/Mobile Input -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant" for="identifier">Email or Mobile Number</label>
<div class="relative">
<input class="w-full h-[48px] px-4 rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary/10 focus:border-primary outline-none transition-all font-body-md placeholder:text-outline" id="identifier" placeholder="Enter your email or phone" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-[48px] px-4 pr-12 rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary/10 focus:border-primary outline-none transition-all font-body-md placeholder:text-outline" id="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2">
<input class="w-4 h-4 rounded border-outline text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-label-md text-label-md text-on-surface-variant select-none" for="remember">Remember Me</label>
</div>
<!-- Primary Action -->
<button class="w-full h-[48px] bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary-container hover:shadow-lg active:scale-95 transition-all duration-200 uppercase tracking-wide" type="submit">
                    Login
                </button>
<!-- Divider -->
<div class="relative flex items-center gap-4 py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="text-label-sm font-label-sm text-outline uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="space-y-3">
<button class="flex items-center justify-center gap-3 w-full h-[48px] border border-outline-variant rounded-lg hover:bg-surface-container transition-all active:scale-95 group" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-md text-label-md text-on-surface">Continue with Google</span>
</button>
<button class="flex items-center justify-center gap-3 w-full h-[48px] border border-outline-variant rounded-lg hover:bg-surface-container transition-all active:scale-95" type="button">
<svg class="w-5 h-5" fill="#1877F2" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
<span class="font-label-md text-label-md text-on-surface">Continue with Facebook</span>
</button>
</div>
</form>
<!-- Secondary Action -->
<div class="mt-8 pt-6 border-t border-outline-variant text-center">
<p class="text-on-surface-variant font-body-md">
                    Don't have an account? 
                    <a class="text-secondary font-bold hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</main>
<!-- Footer Component -->
<footer class="bg-surface-container-low dark:bg-surface-container-high w-full mt-auto border-t border-outline-variant dark:border-outline">
<div class="flex flex-col md:flex-row justify-between items-center max-w-container-max mx-auto px-margin-desktop py-8">
<div class="mb-4 md:mb-0">
<span class="font-headline-md text-headline-md text-primary font-bold">Ravi Store</span>
<p class="font-label-sm text-label-sm text-on-surface-variant dark:text-surface-variant mt-1">© 2024 Ravi Store. All rights reserved.</p>
</div>
<div class="flex flex-wrap justify-center gap-6">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-secondary dark:hover:text-secondary-fixed underline transition-all opacity-80 hover:opacity-100" href="#">Terms and Conditions</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-secondary dark:hover:text-secondary-fixed underline transition-all opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-secondary dark:hover:text-secondary-fixed underline transition-all opacity-80 hover:opacity-100" href="#">Help Center</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-secondary dark:hover:text-secondary-fixed underline transition-all opacity-80 hover:opacity-100" href="#">Contact Us</a>
</div>
</div>
</footer>
<!-- Add To Cart (Accent FAB) - Suppressed on Login per instructions -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Handle form submission micro-interaction
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="flex items-center justify-center"><svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Authenticating...</span>';
            
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = originalText;
                alert('Authentication service placeholder activated.');
            }, 1500);
        });
    </script>
</body></html>
